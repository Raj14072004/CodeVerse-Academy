<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CodeVerse Pro — Master Tech Skills</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--bg2:#111118;--bg3:#16161f;--card:#1a1a24;--card2:#1f1f2e;
--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
--text:#f0f0ff;--muted:#8888aa;--faint:#444460;
--em:#7c6bff;--em2:#a78bfa;--em3:#c4b5fd;
--acc:#ff6b9d;--acc2:#fb923c;--teal:#2dd4bf;
--success:#34d399;--warn:#fbbf24;--danger:#f87171;
--font-disp:'Clash Display',sans-serif;
--font-body:'Cabinet Grotesk',sans-serif;
--r:12px;--r2:18px;--r3:24px;
}
[data-theme=light]{
--bg:#f5f4ff;--bg2:#eeeeff;--bg3:#e8e7fc;--card:#fff;--card2:#f0efff;
--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
--text:#0d0d1a;--muted:#5555778;--faint:#aaaacc;
--em:#5b47e8;--em2:#7c6bff;--em3:#a78bfa;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--em);border-radius:3px}

/* ── KEYFRAMES ───────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(124,107,255,.5)}70%{box-shadow:0 0 0 14px rgba(124,107,255,0)}100%{box-shadow:0 0 0 0 rgba(124,107,255,0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes slideLeft{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes marqueeLTR{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── NAVBAR ──────────────────────────────────── */
.navbar{position:fixed;top:0;left:0;right:0;z-index:200;transition:all .35s ease}
.navbar.scrolled{background:rgba(10,10,15,.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
[data-theme=light] .navbar.scrolled{background:rgba(245,244,255,.88)}
.nav-inner{max-width:1260px;margin:0 auto;padding:0 28px;height:72px;display:flex;align-items:center;gap:32px}
.nav-logo{font-family:var(--font-disp);font-weight:700;font-size:1.25rem;background:linear-gradient(135deg,var(--em),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;flex-shrink:0}
.nav-links{display:flex;gap:4px;flex:1;justify-content:center}
.nav-link{background:none;border:none;color:var(--muted);font-family:var(--font-body);font-size:.9rem;font-weight:500;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .2s}
.nav-link:hover,.nav-link.active{color:var(--text);background:var(--border)}
.nav-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
.theme-btn{width:40px;height:40px;border:1px solid var(--border2);background:var(--card);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--muted)}
.theme-btn:hover{border-color:var(--em);color:var(--em)}
.nav-cta{background:linear-gradient(135deg,var(--em),#a855f7);color:#fff;border:none;padding:10px 22px;border-radius:10px;font-family:var(--font-body);font-size:.88rem;font-weight:700;cursor:pointer;transition:all .25s}
.nav-cta:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,107,255,.45)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:6px}
.hamburger span{width:22px;height:2px;background:var(--text);border-radius:2px;display:block;transition:all .3s}
.mobile-nav{display:none;position:fixed;top:72px;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:20px 28px;flex-direction:column;gap:8px;z-index:199}
.mobile-nav.open{display:flex;animation:fadeIn .2s ease}
.mobile-link{color:var(--muted);background:none;border:none;font-family:var(--font-body);font-size:1rem;font-weight:500;padding:12px 0;border-bottom:1px solid var(--border);text-align:left;cursor:pointer}

/* ── HERO ────────────────────────────────────── */
.hero{min-height:100vh;display:flex;align-items:center;padding:100px 28px 60px;position:relative;overflow:hidden}
.hero-canvas{position:absolute;inset:0;pointer-events:none}
.hero-mesh{position:absolute;width:700px;height:700px;border-radius:50%;background:conic-gradient(from 0deg,rgba(124,107,255,.18),rgba(168,85,247,.12),rgba(255,107,157,.1),rgba(124,107,255,.18));filter:blur(80px);animation:spinSlow 25s linear infinite;top:-200px;right:-200px}
.hero-mesh2{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,191,.12) 0%,transparent 70%);filter:blur(60px);bottom:-100px;left:-100px;animation:float 8s ease-in-out infinite}
.dot-grid{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px);background-size:40px 40px}
.hero-inner{max-width:1260px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;position:relative;z-index:1}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(124,107,255,.12);border:1px solid rgba(124,107,255,.25);padding:6px 14px;border-radius:100px;font-size:.78rem;font-weight:700;color:var(--em3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:22px;animation:fadeUp .7s ease both}
.hero-pulse{width:6px;height:6px;background:var(--em);border-radius:50%;animation:pulseRing 2s infinite}
.hero h1{font-family:var(--font-disp);font-size:clamp(2.4rem,5.5vw,4.2rem);font-weight:700;line-height:1.07;margin-bottom:22px;animation:fadeUp .7s .1s ease both}
.grad-text{background:linear-gradient(135deg,var(--em2) 0%,var(--acc) 50%,var(--acc2) 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 5s ease infinite}
.hero-desc{color:var(--muted);font-size:1.08rem;line-height:1.75;margin-bottom:36px;max-width:500px;animation:fadeUp .7s .2s ease both}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;animation:fadeUp .7s .3s ease both}
.btn-primary{background:linear-gradient(135deg,var(--em),#a855f7);color:#fff;border:none;padding:15px 32px;border-radius:12px;font-family:var(--font-body);font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(124,107,255,.45)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2);padding:15px 32px;border-radius:12px;font-family:var(--font-body);font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:8px}
.btn-outline:hover{border-color:var(--em);color:var(--em);transform:translateY(-2px)}
.hero-stats{display:flex;gap:32px;margin-top:48px;animation:fadeUp .7s .4s ease both}
.hstat-num{font-family:var(--font-disp);font-size:1.9rem;font-weight:700;background:linear-gradient(135deg,#fff,var(--em3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
[data-theme=light] .hstat-num{background:linear-gradient(135deg,var(--em),var(--acc));-webkit-background-clip:text;background-clip:text}
.hstat-label{font-size:.8rem;color:var(--muted);margin-top:2px}
.hero-visual{position:relative;animation:fadeUp .8s .3s ease both}
.hv-main{background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;position:relative;animation:float 6s ease-in-out infinite}
.hv-badge{position:absolute;top:-18px;right:24px;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:600}
.hv-badge-dot{width:8px;height:8px;background:var(--success);border-radius:50%}
.hv-chart{display:flex;align-items:flex-end;gap:8px;height:100px;margin:16px 0}
.hv-bar{flex:1;border-radius:6px 6px 0 0;transition:height .3s}
.hv-track{background:var(--bg3);border-radius:10px;padding:16px;margin-top:16px}
.hv-track-label{font-size:.75rem;color:var(--muted);margin-bottom:8px}
.hv-progress{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.hv-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--em),var(--acc));animation:fadeUp 1s 1s ease both}
.hv-card2{position:absolute;bottom:-24px;left:-32px;background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:14px 18px;min-width:160px;animation:float 6s 2s ease-in-out infinite}
.hv-card3{position:absolute;top:30px;right:-28px;background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:14px 18px;animation:float 6s 1s ease-in-out infinite}

/* ── MARQUEE ─────────────────────────────────── */
.marquee-section{padding:40px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow:hidden;position:relative}
.marquee-inner{display:flex;gap:0;white-space:nowrap;animation:marqueeLTR 30s linear infinite}
.marquee-item{display:inline-flex;align-items:center;gap:10px;padding:0 32px;font-size:.85rem;font-weight:600;color:var(--muted);flex-shrink:0}
.marquee-sep{width:4px;height:4px;background:var(--em);border-radius:50%;flex-shrink:0}

/* ── SECTION COMMONS ─────────────────────────── */
section{padding:96px 28px}
.section-max{max-width:1260px;margin:0 auto}
.section-label{font-size:.75rem;font-weight:700;color:var(--em);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.section-title{font-family:var(--font-disp);font-size:clamp(1.9rem,4vw,2.8rem);font-weight:700;line-height:1.15;margin-bottom:14px}
.section-sub{color:var(--muted);font-size:1rem;line-height:1.7;max-width:560px}
.section-head{margin-bottom:56px}
.section-head-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:56px}

/* ── COURSES ─────────────────────────────────── */
.courses-section{background:var(--bg2)}
.filters-bar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:32px;align-items:center}
.search-box{position:relative;flex:1;min-width:220px;max-width:340px}
.search-input{width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text);padding:12px 16px 12px 44px;border-radius:12px;font-family:var(--font-body);font-size:.9rem;outline:none;transition:all .2s}
.search-input::placeholder{color:var(--faint)}
.search-input:focus{border-color:var(--em);box-shadow:0 0 0 3px rgba(124,107,255,.12)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.filter-chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:100px;font-family:var(--font-body);font-size:.83rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:hover{border-color:var(--em2);color:var(--em2)}
.chip.active{background:rgba(124,107,255,.15);border-color:var(--em);color:var(--em2)}
.filter-select{background:var(--card);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:12px;font-family:var(--font-body);font-size:.85rem;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;padding-right:32px;min-width:140px}
.filter-select-wrap{position:relative}
.filter-select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:.75rem}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px}
.course-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .3s ease;position:relative}
.course-card:hover{transform:translateY(-6px);border-color:rgba(124,107,255,.4);box-shadow:0 24px 60px rgba(0,0,0,.35)}
.card-thumb{height:165px;position:relative;display:flex;align-items:center;justify-content:center;font-size:3.5rem;overflow:hidden}
.card-thumb-glow{position:absolute;inset:0;opacity:.6}
.card-thumb-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(26,26,36,.9))}
.card-badge{position:absolute;top:12px;left:12px;font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:.5px}
.badge-beginner{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3)}
.badge-intermediate{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.badge-advanced{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.card-fav{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.4);border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;backdrop-filter:blur(4px)}
.card-fav:hover,.card-fav.saved{color:#f87171}
.card-body{padding:18px}
.card-cat{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.card-title{font-family:var(--font-disp);font-weight:600;font-size:.98rem;line-height:1.4;margin-bottom:12px}
.card-instructor{display:flex;align-items:center;gap:7px;margin-bottom:12px;font-size:.8rem;color:var(--muted)}
.card-instructor-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
.card-meta{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.card-rating{display:flex;align-items:center;gap:4px;font-size:.83rem;font-weight:600}
.stars{color:#fbbf24;font-size:.78rem}
.card-reviews{color:var(--muted);font-size:.75rem;font-weight:400}
.card-dur{font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:13px;border-top:1px solid var(--border)}
.card-price{font-family:var(--font-disp);font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--em2),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card-old-price{font-size:.78rem;color:var(--faint);text-decoration:line-through;margin-left:6px}
.card-enroll{background:rgba(124,107,255,.15);border:1px solid rgba(124,107,255,.3);color:var(--em2);padding:7px 16px;border-radius:8px;font-family:var(--font-body);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s}
.card-enroll:hover{background:var(--em);border-color:var(--em);color:#fff}

/* ── SKELETON ─────────────────────────────────── */
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.skel-thumb{height:165px}
.skel-body{padding:18px;display:flex;flex-direction:column;gap:10px}
.skel-line{height:12px}
.skel-sm{width:35%}
.skel-md{width:65%}
.skel-lg{width:100%}
.skel-title{height:17px;width:85%}

/* ── PAGINATION ───────────────────────────────── */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:48px}
.page-btn{width:38px;height:38px;border:1px solid var(--border2);background:var(--card);color:var(--muted);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:var(--font-body);font-size:.88rem;font-weight:600;transition:all .2s}
.page-btn:hover{border-color:var(--em);color:var(--em)}
.page-btn.active{background:var(--em);border-color:var(--em);color:#fff}
.page-btn:disabled{opacity:.35;cursor:default}

/* ── MODAL ────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r3);width:100%;max-width:720px;max-height:90vh;overflow-y:auto;position:relative;animation:scaleIn .25s ease}
.modal-close{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;justify-content:flex-end;z-index:10}
.close-btn{background:var(--card);border:1px solid var(--border2);color:var(--muted);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.close-btn:hover{color:var(--text);border-color:var(--border2)}
.modal-body{padding:28px}
.modal-thumb{height:200px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:5rem;margin-bottom:24px;position:relative;overflow:hidden}
.modal-badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.modal-title{font-family:var(--font-disp);font-size:1.7rem;font-weight:700;margin-bottom:10px}
.modal-desc{color:var(--muted);font-size:.95rem;line-height:1.75;margin-bottom:22px}
.modal-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.modal-tag{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:5px 13px;border-radius:100px;font-size:.77rem;font-weight:600}
.modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.modal-info-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.modal-info-label{font-size:.73rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.modal-info-val{font-family:var(--font-disp);font-size:.98rem;font-weight:600}
.modal-footer{display:flex;gap:12px;align-items:center}
.modal-price-block{flex:1}
.modal-price{font-family:var(--font-disp);font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--em2),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal-old-price{font-size:.9rem;color:var(--faint);text-decoration:line-through}
.modal-discount{font-size:.78rem;color:var(--success);font-weight:700;margin-left:8px}
.btn-enroll{background:linear-gradient(135deg,var(--em),#a855f7);color:#fff;border:none;padding:14px 32px;border-radius:12px;font-family:var(--font-body);font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s}
.btn-enroll:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,107,255,.45)}

/* ── WHY US ───────────────────────────────────── */
.why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-top:56px}
.why-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:30px 26px;position:relative;overflow:hidden;transition:all .3s}
.why-card:hover{transform:translateY(-4px);border-color:rgba(124,107,255,.35)}
.why-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--em),var(--acc));transform:scaleX(0);transform-origin:left;transition:transform .35s}
.why-card:hover::after{transform:scaleX(1)}
.why-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.why-title{font-family:var(--font-disp);font-weight:600;font-size:1rem;margin-bottom:9px}
.why-desc{color:var(--muted);font-size:.88rem;line-height:1.65}

/* ── TESTIMONIALS ─────────────────────────────── */
.testi-section{background:var(--bg2)}
.testi-slider{position:relative;overflow:hidden}
.testi-track{display:flex;gap:22px;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.testi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:28px;min-width:calc(33.33% - 15px);flex-shrink:0;transition:all .3s}
.testi-card:hover{border-color:rgba(124,107,255,.3)}
.testi-quote-mark{font-family:Georgia,serif;font-size:4rem;line-height:1;color:var(--em);opacity:.3;margin-bottom:8px}
.testi-text{color:var(--text);font-size:.93rem;line-height:1.73;margin-bottom:20px;font-style:italic;opacity:.85}
.testi-author{display:flex;align-items:center;gap:12px}
.testi-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;flex-shrink:0}
.testi-name{font-family:var(--font-disp);font-weight:600;font-size:.92rem}
.testi-role{font-size:.77rem;color:var(--muted);margin-top:2px}
.testi-stars{color:#fbbf24;font-size:.82rem;margin-bottom:12px}
.slider-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:36px}
.slider-btn{width:42px;height:42px;background:var(--card);border:1px solid var(--border2);border-radius:10px;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.slider-btn:hover{border-color:var(--em);color:var(--em)}
.slider-dots{display:flex;gap:8px;align-items:center}
.slider-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .2s}
.slider-dot.active{background:var(--em);width:22px;border-radius:4px}

/* ── CTA SECTION ──────────────────────────────── */
.cta-section{padding:100px 28px;position:relative;overflow:hidden}
.cta-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,107,255,.08) 0%,rgba(168,85,247,.06) 50%,rgba(255,107,157,.06) 100%)}
.cta-grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(124,107,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(124,107,255,.06) 1px,transparent 1px);background-size:50px 50px}
.cta-inner{max-width:700px;margin:0 auto;text-align:center;position:relative;z-index:1}
.cta-inner .section-title{margin-bottom:16px}
.cta-inner .section-sub{margin:0 auto 36px;max-width:480px}
.cta-buttons{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}

/* ── FOOTER ───────────────────────────────────── */
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:64px 28px 32px}
.footer-inner{max-width:1260px;margin:0 auto}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:48px}
.footer-brand-logo{font-family:var(--font-disp);font-weight:700;font-size:1.2rem;background:linear-gradient(135deg,var(--em),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.footer-brand-desc{color:var(--muted);font-size:.87rem;line-height:1.7;max-width:270px;margin-bottom:20px}
.footer-socials{display:flex;gap:10px}
.social-icon{width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s}
.social-icon:hover{border-color:var(--em);color:var(--em);transform:translateY(-2px)}
.footer-col-title{font-family:var(--font-disp);font-weight:600;font-size:.93rem;margin-bottom:16px}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.footer-col a{color:var(--muted);font-size:.86rem;cursor:pointer;transition:color .2s;text-decoration:none}
.footer-col a:hover{color:var(--text)}
.footer-bottom{border-top:1px solid var(--border);padding-top:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-bottom p{color:var(--muted);font-size:.82rem}

/* ── NO RESULTS ───────────────────────────────── */
.empty-state{text-align:center;padding:72px 20px;color:var(--muted);animation:fadeIn .3s ease}
.empty-icon{font-size:3.5rem;margin-bottom:16px;opacity:.5}
.empty-title{font-family:var(--font-disp);font-size:1.2rem;color:var(--text);margin-bottom:8px}

/* ── TOAST ────────────────────────────────────── */
.toast{position:fixed;bottom:28px;right:28px;background:var(--card);border:1px solid var(--em);color:var(--text);padding:14px 20px;border-radius:12px;font-size:.88rem;font-weight:600;z-index:999;animation:slideLeft .3s ease;display:flex;align-items:center;gap:8px;box-shadow:0 12px 40px rgba(0,0,0,.4)}

/* ── RESPONSIVE ───────────────────────────────── */
@media(max-width:1024px){.hero-inner{grid-template-columns:1fr}.hero-visual{display:none}.footer-grid{grid-template-columns:1fr 1fr}.testi-card{min-width:calc(50% - 11px)}}
@media(max-width:768px){.nav-links,.nav-cta{display:none}.hamburger{display:flex}.footer-grid{grid-template-columns:1fr}.testi-card{min-width:100%}section{padding:72px 20px}}
@media(max-width:500px){.modal-info-grid{grid-template-columns:1fr}}
</style>

          </div>
          <div className="modal-info-grid">
            {[[`${Stars(course.rating)} ${course.rating}`,'Rating'],[`${course.reviews.toLocaleString()}+`,'Reviews'],[course.duration,'Duration'],[`${course.lectures} lectures`,'Content'],[`${course.assignments} projects`,'Assignments'],[`${course.students.toLocaleString()}+`,'Students']].map(([v,l]) => (
              <div key={l} className="modal-info-box">
                <div className="modal-info-label">{l}</div>
                <div className="modal-info-val">{v}</div>
              </div>
            ))}
          </div>
          <div className="modal-footer">
            <div className="modal-price-block">
              <div>
                <span className="modal-price">₹{course.price.toLocaleString()}</span>
                <span className="modal-old-price"> ₹{course.oldPrice.toLocaleString()}</span>
                <span className="modal-discount">{discount}% OFF</span>
              </div>
              <div style={{fontSize:'.78rem',color:'var(--muted)',marginTop:4}}>Instructor: {course.instructor}</div>
            </div>
            <button className="btn-enroll" onClick={() => { addToast(`Enrolled in ${course.title}!`); onClose(); }}>
              Enroll Now →
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ─── COURSE CARD ──────────────────────────────────────────────────────────── */
const CourseCard = ({course, onOpen}) => {
  const {saved, toggleSave} = useApp();
  const isSaved = saved.includes(course.id);
  const discount = Math.round((1-course.price/course.oldPrice)*100);
  const catColors = {
    'Web Dev':'#7c6bff','Data Science':'#2dd4bf','Cloud':'#60a5fa','Design':'#f472b6',
    'Security':'#f87171','Web3':'#a78bfa','Mobile':'#34d399','AI':'#fb923c'
  };
  return (
    <div className="course-card" onClick={() => onOpen(course)}>
      <div className="card-thumb" style={{background:course.color}}>
        <div className="card-thumb-glow" style={{background:course.color}}/>
        <div className="card-thumb-overlay"/>
        <span style={{position:'relative',zIndex:1,fontSize:'3rem'}}>{course.emoji}</span>
        <span className={`card-badge badge-${course.level.toLowerCase()}`}>{course.level}</span>
        <button className={`card-fav${isSaved?' saved':''}`} onClick={e => {e.stopPropagation();toggleSave(course.id);}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill={isSaved?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
      <div className="card-body">
        <div className="card-cat" style={{color:catColors[course.category]||'var(--em)'}}>{course.category}</div>
        <div className="card-title">{course.title}</div>
        <div className="card-instructor">
          <div className="card-instructor-avatar" style={{background:catColors[course.category]||'var(--em)',color:'#fff'}}>
            {course.instructor.split(' ').map(w=>w[0]).join('')}
          </div>
          {course.instructor}
        </div>
        <div className="card-meta">
          <div className="card-rating">
            <span className="stars">{Stars(course.rating)}</span>
            <span style={{marginLeft:4}}>{course.rating}</span>
            <span className="card-reviews"> ({course.reviews.toLocaleString()})</span>
          </div>
          <div className="card-dur">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            {course.duration}
          </div>
        </div>
        <div className="card-footer">
          <div>
            <span className="card-price">₹{course.price.toLocaleString()}</span>
            <span className="card-old-price">₹{course.oldPrice.toLocaleString()}</span>
          </div>
          <button className="card-enroll" onClick={e => {e.stopPropagation();onOpen(course);}}>Preview</button>
        </div>
      </div>
    </div>
  );
};

/* ─── COURSES SECTION ──────────────────────────────────────────────────────── */
const CoursesSection = () => {
  const {addToast} = useApp();
  const [search, setSearch] = useState('');
  const [cat, setCat] = useState('All');
  const [level, setLevel] = useState('All Levels');
  const [sort, setSort] = useState('Popular');
  const [page, setPage] = useState(1);
  const [loading, setLoading] = useState(false);
  const [modal, setModal] = useState(null);
  const dSearch = useDebounce(search, 320);

  useEffect(() => {
    setLoading(true);
    const t = setTimeout(() => setLoading(false), 800);
    return () => clearTimeout(t);
  }, [cat, level, sort]);

  useEffect(() => { setPage(1); }, [dSearch, cat, level]);

  const filtered = useMemo(() => {
    let res = COURSES.filter(c => {
      const ms = dSearch === '' || c.title.toLowerCase().includes(dSearch.toLowerCase()) || c.tags.some(t => t.toLowerCase().includes(dSearch.toLowerCase()));
      const mc = cat === 'All' || c.category === cat;
      const ml = level === 'All Levels' || c.level === level;
      return ms && mc && ml;
    });
    if (sort==='Price: Low') res = [...res].sort((a,b) => a.price-b.price);
    else if (sort==='Price: High') res = [...res].sort((a,b) => b.price-a.price);
    else if (sort==='Rating') res = [...res].sort((a,b) => b.rating-a.rating);
    return res;
  }, [dSearch, cat, level, sort]);

  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const paginated = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  return (
    <section id="courses-section" style={{background:'var(--bg2)',padding:'96px 28px'}}>
      <div className="section-max">
        <div className="section-head-row">
          <div>
            <div className="section-label">🔥 Browse Courses</div>
            <h2 className="section-title">Find Your Perfect <span style={{background:'linear-gradient(135deg,var(--em2),var(--acc))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>Learning Path</span></h2>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
            <div className="filter-select-wrap">
              <select className="filter-select" value={sort} onChange={e => setSort(e.target.value)}>
                {['Popular','Rating','Price: Low','Price: High'].map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="filter-select-wrap">
              <select className="filter-select" value={level} onChange={e => setLevel(e.target.value)}>
                {LEVELS.map(l => <option key={l}>{l}</option>)}
              </select>
            </div>
          </div>
        </div>

        <div className="filters-bar">
          <div className="search-box">
            <span className="search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input className="search-input" placeholder="Search courses or topics…" value={search} onChange={e => setSearch(e.target.value)}/>
          </div>
          <div className="filter-chips">
            {CATS.map(c => <button key={c} className={`chip${cat===c?' active':''}`} onClick={() => setCat(c)}>{c}</button>)}
          </div>
        </div>

        {loading ? (
          <div className="courses-grid">{[...Array(6)].map((_,i) => <SkeletonCard key={i}/>)}</div>
        ) : paginated.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">🔍</div>
            <div className="empty-title">No courses found</div>
            <p>Try a different search term or filter combination.</p>
          </div>
        ) : (
          <div className="courses-grid" style={{animation:'fadeIn .4s ease'}}>
            {paginated.map(c => <CourseCard key={c.id} course={c} onOpen={setModal}/>)}
          </div>
        )}

        {totalPages > 1 && !loading && (
          <div className="pagination">
            <button className="page-btn" onClick={() => setPage(p => p-1)} disabled={page===1}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            {[...Array(totalPages)].map((_,i) => (
              <button key={i} className={`page-btn${page===i+1?' active':''}`} onClick={() => setPage(i+1)}>{i+1}</button>
            ))}
            <button className="page-btn" onClick={() => setPage(p => p+1)} disabled={page===totalPages}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        )}

        <div style={{textAlign:'center',marginTop:16,color:'var(--muted)',fontSize:'.83rem'}}>
          Showing {Math.min(paginated.length, PER_PAGE)} of {filtered.length} courses
        </div>
      </div>
      {modal && <CourseModal course={modal} onClose={() => setModal(null)}/>}
    </section>
  );
};

/* ─── WHY US ───────────────────────────────────────────────────────────────── */
const WhyUs = () => (
  <section id="why-section">
    <div className="section-max">
      <div className="section-head" style={{textAlign:'center',maxWidth:600,margin:'0 auto 0'}}>

/* ─── TESTIMONIALS ─────────────────────────────────────────────────────────── */
const Testimonials = () => {
  const [idx, setIdx] = useState(0);
  const visCount = window.innerWidth >= 1024 ? 3 : window.innerWidth >= 640 ? 2 : 1;
  const maxIdx = TESTIMONIALS.length - visCount;

  const prev = () => setIdx(i => Math.max(0, i-1));
  const next = () => setIdx(i => Math.min(maxIdx, i+1));

  return (
    <section className="testi-section" id="testimonials-section">
      <div className="section-max">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:20,marginBottom:48}}>
          <div>
            <div className="section-label">💬 Success Stories</div>
            <h2 className="section-title">Real People,<br/><span style={{background:'linear-gradient(135deg,var(--em2),var(--acc))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>Real Results</span></h2>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="slider-btn" onClick={prev} disabled={idx===0} style={{opacity:idx===0?.4:1}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button className="slider-btn" onClick={next} disabled={idx>=maxIdx} style={{opacity:idx>=maxIdx?.4:1}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
        <div className="testi-slider">
          <div className="testi-track" style={{transform:`translateX(calc(-${idx} * (100% / ${visCount}) - ${idx} * 22px / ${visCount}))`}}>
            {TESTIMONIALS.map((t,i) => (
              <div key={i} className="testi-card">
                <div className="testi-quote-mark">"</div>
                <div className="testi-stars">{Stars(t.stars)}</div>
                <p className="testi-text">{t.text}</p>
                <div className="testi-author">
                  <div className="testi-avatar" style={{background:t.grad,color:'#fff'}}>{t.avatar}</div>
                  <div>
                    <div className="testi-name">{t.name}</div>
                    <div className="testi-role">{t.role}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="slider-dots" style={{display:'flex',justifyContent:'center',marginTop:28}}>
          {TESTIMONIALS.map((_,i) => (
            <div key={i} className={`slider-dot${i===idx?' active':''}`} onClick={() => setIdx(Math.min(i, maxIdx))}/>
          ))}
        </div>
      </div>
    </section>
  );
};

/* ─── FOOTER ───────────────────────────────────────────────────────────────── */
const Footer = ({onNav}) => (
  <footer className="footer">
    <div className="footer-inner">
      <div className="footer-grid">
        <div>
          <div className="footer-brand-logo">CodeVerse Pro</div>
          <p className="footer-brand-desc">India's leading platform for practical tech education. Learn from engineers who've shipped at top companies.</p>
          <div className="footer-socials">
            {[
              <svg key="tw" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.26 5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>,
              <svg key="li" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>,
              <svg key="gh" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>,
              <svg key="yt" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="var(--bg)"/></svg>

          {title:'Company',links:['About Us','Careers','Blog','Press Kit','Partners','Contact']},

      </div>
    </div>
  </footer>
);

/* ─── APP PROVIDER + ROOT ──────────────────────────────────────────────────── */
const App = () => {
  const [theme, setTheme] = useState('dark');
  const [saved, setSaved] = useState([]);
  const [toasts, setToasts] = useState([]);
  const [activeSection, setActiveSection] = useState('hero');

  const toggleTheme = useCallback(() => {
    setTheme(t => {
      const next = t === 'dark' ? 'light' : 'dark';
      document.body.parentElement.setAttribute('data-theme', next);
      return next;
    });
  }, []);

  const toggleSave = useCallback(id => {
    setSaved(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  }, []);

  const addToast = useCallback(msg => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg}]);
  }, []);

  const removeToast = useCallback(id => setToasts(t => t.filter(x=>x.id!==id)), []);

  const scrollToSection = useCallback(sec => {
    const ids = {hero:'hero-section',courses:'courses-section',why:'why-section',testimonials:'testimonials-section'};
    const el = document.getElementById(ids[sec]);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
    setActiveSection(sec);
  }, []);

  useEffect(() => {
    document.body.parentElement.setAttribute('data-theme', theme);
  }, []);

  useEffect(() => {
    const sections = [{id:'hero-section',key:'hero'},{id:'courses-section',key:'courses'},{id:'why-section',key:'why'},{id:'testimonials-section',key:'testimonials'}];
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting) setActiveSection(sections.find(s=>s.id===e.target.id)?.key || 'hero');
      });
    }, {threshold:.3});
    sections.forEach(s => { const el = document.getElementById(s.id); if(el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);

  return (
    <AppCtx.Provider value={{theme, toggleTheme, saved, toggleSave, addToast}}>
      <Navbar activeSection={activeSection} onNav={scrollToSection}/>
      <Hero onExplore={() => scrollToSection('courses')}/>
      <Marquee/>
      <CoursesSection/>
      <WhyUs/>
      <Testimonials/>
      <CTA onExplore={() => scrollToSection('courses')}/>
      <Footer onNav={scrollToSection}/>
      {toasts.map(t => <Toast key={t.id} msg={t.msg} onDone={() => removeToast(t.id)}/>)}
    </AppCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
